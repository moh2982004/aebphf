<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

<title>Magasin Store - Réceptionnaire</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
    padding:20px;
}

/* LOGIN */

.login-container{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#111,#333);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:5000;
    padding:20px;
}

.login-box{
    background:white;
    width:100%;
    max-width:420px;
    padding:30px 20px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
    from{
        transform:translateY(20px);
        opacity:0;
    }
    to{
        transform:translateY(0);
        opacity:1;
    }
}

.login-box h1{
    text-align:center;
    margin-bottom:10px;
    color:#111;
    font-size:1.8rem;
}

.login-box p{
    text-align:center;
    color:#666;
    margin-bottom:25px;
}

.login-box input,
.login-box select{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid #ccc;
    margin-bottom:18px;
    font-size:15px;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:black;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#333;
}

/* HEADER RESPONSIVE */
header{
    background:white;
    padding:15px;
    border-radius:15px;
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
    flex-wrap:wrap;
    gap:15px;
}

header h1{
    color:#111;
    font-size:1.5rem;
}

.user-info{
    background:#f0f2f5;
    padding:10px 15px;
    border-radius:12px;
    font-size:13px;
    color:#333;
    word-break:break-word;
}

.search-box{
    width:280px;
}

.search-box input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:14px;
}

/* SECTION DES DEMANDES RESPONSIVE */
.demandes-section{
    background:white;
    border-radius:20px;
    padding:15px;
    margin-bottom:25px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.demandes-section h2{
    margin-bottom:15px;
    color:#111;
    font-size:1.2rem;
    border-left:4px solid #ff9800;
    padding-left:12px;
}

.demandes-table{
    width:100%;
    border-collapse:collapse;
    min-width:650px;
}

.demandes-table th,
.demandes-table td{
    padding:10px 8px;
    text-align:left;
    border-bottom:1px solid #e0e0e0;
    font-size:13px;
}

.demandes-table th{
    background:#f8f9fa;
    font-weight:bold;
    color:#333;
}

.status{
    display:inline-block;
    padding:4px 10px;
    border-radius:20px;
    font-size:11px;
    font-weight:bold;
    white-space:nowrap;
}

.status-en-attente{
    background:#fff3e0;
    color:#e65100;
}

.status-valide{
    background:#e8f5e9;
    color:#2e7d32;
}

.status-refuse{
    background:#ffebee;
    color:#c62828;
}

.commentaire-cell{
    max-width:200px;
    word-wrap:break-word;
    white-space:normal;
    font-size:12px;
    color:#666;
}

.commentaire-text{
    display:inline-block;
    background:#f5f5f5;
    padding:4px 8px;
    border-radius:8px;
    font-style:italic;
}

/* GRILLE PRODUITS RESPONSIVE */
.products-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    flex-wrap:wrap;
    gap:10px;
}

.products-header h2{
    color:#111;
    font-size:1.2rem;
    border-left:4px solid #ff9800;
    padding-left:12px;
}

.toggle-hidden-btn{
    background:#6c757d;
    padding:10px 20px;
    border:none;
    border-radius:12px;
    color:white;
    cursor:pointer;
    font-size:14px;
    transition:0.3s;
}

.toggle-hidden-btn:hover{
    background:#5a6268;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    transition:0.3s;
    position:relative;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.reference{
    color:#777;
    font-size:13px;
    margin-bottom:8px;
    word-break:break-word;
}

.designation{
    font-size:1.1rem;
    font-weight:bold;
    margin-bottom:12px;
    color:#111;
    word-break:break-word;
}

.stock{
    display:inline-block;
    padding:6px 12px;
    border-radius:20px;
    font-weight:bold;
    margin-bottom:15px;
    font-size:13px;
}

.stock-ok{
    background:#d4edda;
    color:#155724;
}

.stock-low{
    background:#fff3cd;
    color:#856404;
}

.stock-out{
    background:#f8d7da;
    color:#721c24;
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#000;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    background:#444;
}

.btn:disabled{
    opacity:0.5;
    cursor:not-allowed;
}

/* Bouton déconnexion */
.logout-btn{
    background:#dc3545;
    padding:8px 16px;
    border-radius:12px;
    font-size:14px;
    width:auto;
    display:inline-block;
}

.logout-btn:hover{
    background:#b02a37;
}

/* MODAL RESPONSIVE */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
    padding:20px;
}

.modal-content{
    background:white;
    width:100%;
    max-width:400px;
    border-radius:20px;
    padding:25px 20px;
    animation:popup 0.3s ease;
}

@keyframes popup{
    from{
        transform:scale(0.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.modal-content h2{
    margin-bottom:20px;
    font-size:1.3rem;
}

.modal-content p{
    margin-bottom:10px;
    color:#555;
    font-size:14px;
    word-break:break-word;
}

.modal-content input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-top:10px;
    margin-bottom:20px;
    font-size:16px;
}

.modal-buttons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.modal-buttons .btn{
    flex:1;
    min-width:100px;
}

.confirm{
    background:#28a745;
}

.confirm:hover{
    background:#1e7e34;
}

.cancel{
    background:#dc3545;
}

.cancel:hover{
    background:#b02a37;
}

.hidden{
    display:none;
}

/* Conteneur pour scroll horizontal des tables */
.table-wrapper{
    overflow-x:auto;
    border-radius:12px;
}

/* Bouton masquer dans le tableau */
.hide-request-btn{
    background:#dc3545;
    padding:5px 10px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    font-size:11px;
    transition:0.3s;
}

.hide-request-btn:hover{
    background:#b02a37;
}

.show-request-btn{
    background:#28a745;
    padding:5px 10px;
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    font-size:11px;
    transition:0.3s;
}

.show-request-btn:hover{
    background:#1e7e34;
}

/* MEDIA QUERIES */
@media(max-width:768px){
    body{
        padding:15px;
    }
    
    header{
        flex-direction:column;
        align-items:stretch;
    }
    
    .search-box{
        width:100%;
    }
    
    .demandes-section{
        padding:12px;
    }
    
    .demandes-table th,
    .demandes-table td{
        padding:8px 6px;
        font-size:11px;
    }
    
    .commentaire-cell{
        max-width:150px;
    }
    
    .products{
        grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
        gap:15px;
    }
    
    .card img{
        height:150px;
    }
    
    .designation{
        font-size:1rem;
    }
    
    .modal-content{
        padding:20px 15px;
    }
    
    .modal-content h2{
        font-size:1.2rem;
    }
    
    .modal-buttons{
        flex-direction:column;
    }
    
    .modal-buttons .btn{
        width:100%;
    }
}

@media(max-width:480px){
    .products{
        grid-template-columns:1fr;
    }
    
    .demandes-table{
        min-width:600px;
    }
    
    .user-info{
        font-size:12px;
        word-break:break-all;
    }
    
    .login-box{
        padding:25px 15px;
    }
    
    .login-box h1{
        font-size:1.5rem;
    }
}

/* Styles pour les écrans très larges */
@media(min-width:1400px){
    .products{
        grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));
    }
    
    body{
        max-width:1400px;
        margin:0 auto;
    }
}

/* Améliorations générales */
.text-center{
    text-align:center;
}

.products-container{
    min-height:200px;
}

.scrollable-table{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
}

</style>
</head>
<body>

<!-- LOGIN -->

<div class="login-container" id="loginContainer">

    <div class="login-box">

        <h1>🏬 Magasin Store</h1>

        <p>Identification Réceptionnaire</p>

        <select id="typeIdentifiant">

            <option value="">Choisir type identification</option>

            <option value="IPN">IPN</option>

            <option value="UET">UET</option>

            <option value="Nom">Nom et Prénom</option>

        </select>

        <input type="text" id="identifiantInput"
        placeholder="Entrer votre identification">

        <button class="login-btn" onclick="connexion()">
            Entrer
        </button>

    </div>

</div>

<!-- PAGE -->

<div id="mainPage" class="hidden">

<header>

    <div>

        <h1>🏬 Magasin Store</h1>

        <div class="user-info" id="userInfo"></div>

    </div>

    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        <div class="search-box">
            <input type="text" id="searchInput"
            placeholder="🔍 Rechercher un produit...">
        </div>
        <button class="btn logout-btn" onclick="deconnexion()">
            🚪 Déconnexion
        </button>
    </div>

</header>

<!-- TABLEAU DES DEMANDES DU RÉCEPTIONNAIRE CONNECTÉ -->

<div class="demandes-section" id="demandesSection">

    <h2>📋 Mes Demandes</h2>

    <div class="table-wrapper scrollable-table">

        <table class="demandes-table" id="demandesTable">

            <thead>

                <tr>
                    <th>Date</th>
                    <th>Heure</th>
                    <th>Référence</th>
                    <th>Produit</th>
                    <th>Quantité</th>
                    <th>Statut</th>
                    <th>Magasinier</th>
                    <th>Commentaire</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody id="demandesList"></tbody>

        </table>

    </div>

</div>

<!-- PRODUITS -->
<div class="products-header">
    <h2>📦 Catalogue Produits</h2>
    <button class="toggle-hidden-btn" onclick="toggleHiddenProducts()">
        👁️ Afficher produits masqués
    </button>
</div>

<div class="products" id="productsContainer"></div>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

    <div class="modal-content">

        <h2>Demande Produit</h2>

        <p><strong>Référence :</strong>
            <span id="modalRef"></span>
        </p>

        <p><strong>Désignation :</strong>
            <span id="modalName"></span>
        </p>

        <p><strong>Stock disponible :</strong>
            <span id="modalStock"></span>
        </p>

        <input type="number"
        id="quantityInput"
        placeholder="Quantité demandée">

        <div class="modal-buttons">

            <button class="btn confirm"
            onclick="validerDemande()">
                Valider
            </button>

            <button class="btn cancel"
            onclick="closeModal()">
                Annuler
            </button>

        </div>

    </div>

</div>

<script>

// Configuration Firebase
const BASE = "https://magaza-f6681-default-rtdb.europe-west1.firebasedatabase.app";

// URL de redirection pour les magasiniers
const MAGASINIER_REDIRECT_URL = "https://moh2982004.github.io/aebphf/Magasinier.html";

let produits = [];
let produitsFirebaseKeys = {};
let currentUser = null;
let produitSelectionne = null;
let demandes = [];
let produitsDemandes = {}; // Pour compter les demandes par produit
let demandesMasquees = new Set(); // Stocke les IDs des demandes masquées
let afficherMasques = false; // État d'affichage des demandes masquées

const container = document.getElementById("productsContainer");

// Charger les préférences de masquage depuis localStorage
function loadHiddenPreferences() {
    const saved = localStorage.getItem(`hidden_requests_${currentUser?.ipn || 'guest'}`);
    if(saved) {
        demandesMasquees = new Set(JSON.parse(saved));
    }
}

// Sauvegarder les préférences de masquage
function saveHiddenPreferences() {
    localStorage.setItem(`hidden_requests_${currentUser?.ipn || 'guest'}`, JSON.stringify([...demandesMasquees]));
}

// Basculer l'affichage des demandes masquées
function toggleHiddenProducts() {
    afficherMasques = !afficherMasques;
    const btn = document.querySelector('.toggle-hidden-btn');
    if(btn) {
        btn.textContent = afficherMasques ? '🙈 Masquer demandes cachées' : '👁️ Afficher demandes masquées';
    }
    afficherDemandes();
}

// Masquer une demande
function hideRequest(requestId) {
    if(confirm('Voulez-vous masquer cette demande validée de la liste ? Vous pourrez la réafficher plus tard.')) {
        demandesMasquees.add(requestId);
        saveHiddenPreferences();
        afficherDemandes();
    }
}

// Afficher une demande masquée
function showRequest(requestId) {
    demandesMasquees.delete(requestId);
    saveHiddenPreferences();
    afficherDemandes();
}

// Compter les demandes par produit
async function compterDemandesParProduit() {
    if(!currentUser) return;
    
    try {
        const response = await fetch(`${BASE}/demandes.json`);
        const data = await response.json();
        
        produitsDemandes = {};
        
        for(let key in data) {
            const demande = data[key];
            // Compter toutes les demandes de ce réceptionnaire
            if((demande.ipnUtilisateur === currentUser.ipn || 
               demande.nomUtilisateur === currentUser.nom) &&
               demande.statut !== "refuse") { // Ne compter que les demandes validées ou en attente
                
                const ref = demande.referenceProduit;
                if(!produitsDemandes[ref]) {
                    produitsDemandes[ref] = 0;
                }
                produitsDemandes[ref] += demande.quantite || 0;
            }
        }
        
        appliquerTriEtFiltrage();
        
    } catch(error) {
        console.error("Erreur comptage demandes:", error);
    }
}

// Trier les produits par nombre de demandes (plus demandés en premier)
function trierParPopularite(produitsList) {
    return produitsList.sort((a, b) => {
        const demandesA = produitsDemandes[a.reference] || 0;
        const demandesB = produitsDemandes[b.reference] || 0;
        
        if(demandesB !== demandesA) {
            return demandesB - demandesA; // Plus demandé en premier
        }
        
        // En cas d'égalité, trier par stock (plus petit stock en premier)
        return a.stockActuel - b.stockActuel;
    });
}

// Appliquer le tri et le filtrage
function appliquerTriEtFiltrage() {
    let produitsFiltres = [...produits];
    
    // Trier par popularité
    produitsFiltres = trierParPopularite(produitsFiltres);
    
    // Appliquer la recherche si présente
    const searchValue = document.getElementById("searchInput")?.value.toLowerCase() || "";
    if(searchValue) {
        produitsFiltres = produitsFiltres.filter(p =>
            p.designation.toLowerCase().includes(searchValue) ||
            p.reference.toLowerCase().includes(searchValue)
        );
    }
    
    afficherProduits(produitsFiltres);
}

// ========== FONCTION DE DÉCONNEXION ==========
function deconnexion() {
    // Effacer les données de session
    currentUser = null;
    // Cacher la page principale
    document.getElementById("mainPage").classList.add("hidden");
    // Afficher l'écran de connexion
    document.getElementById("loginContainer").style.display = "flex";
    // Réinitialiser les champs
    document.getElementById("typeIdentifiant").value = "";
    document.getElementById("identifiantInput").value = "";
    // Vider le conteneur des produits
    container.innerHTML = "";
    alert("🔓 Vous avez été déconnecté avec succès.");
}

// ========== CHARGER LES PRODUITS DEPUIS FIREBASE ==========
async function loadProductsFromFirebase() {
    try {
        const response = await fetch(`${BASE}/produits.json`);
        const data = await response.json();
        
        produits = [];
        produitsFirebaseKeys = {};
        
        for(let key in data) {
            const produit = data[key];
            produits.push({
                firebaseKey: key,
                reference: produit.reference,
                designation: produit.designation,
                stockActuel: produit.stockActuel || 0,
                stockInitial: produit.stockInitial || 0,
                stockMax: produit.stockMax || 0,
                description: produit.description || "",
                quantiteParBoite: produit.quantiteParBoite || 1,
                image: produit.image || "https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc?q=80&w=1200&auto=format&fit=crop",
                codeBarre: produit.codeBarre || ""
            });
            produitsFirebaseKeys[produit.reference] = key;
        }
        
        await loadDemandes();
        await compterDemandesParProduit();
        
    } catch(error) {
        console.error("Erreur chargement produits:", error);
        alert("Erreur de connexion à la base de données");
    }
}

// ========== CHARGER LES DEMANDES DU RÉCEPTIONNAIRE ==========
async function loadDemandes() {
    if(!currentUser) return;
    
    try {
        const response = await fetch(`${BASE}/demandes.json`);
        const data = await response.json();
        
        demandes = [];
        for(let key in data) {
            const demande = data[key];
            // Filtrer par le réceptionnaire connecté
            if(demande.ipnUtilisateur === currentUser.ipn || 
               demande.nomUtilisateur === currentUser.nom) {
                demandes.push({
                    firebaseKey: key,
                    ...demande
                });
            }
        }
        
        // Trier par date décroissante (plus récent d'abord)
        demandes.sort((a,b) => (b.date + b.heure).localeCompare(a.date + a.heure));
        
        afficherDemandes();
        
    } catch(error) {
        console.error("Erreur chargement demandes:", error);
    }
}

// ========== AFFICHER LES DEMANDES ==========
function afficherDemandes() {
    const tbody = document.getElementById("demandesList");
    if(!tbody) return;
    
    tbody.innerHTML = "";
    
    let demandesFiltrees = demandes;
    
    // Filtrer les demandes masquées si nécessaire
    if(!afficherMasques) {
        demandesFiltrees = demandes.filter(d => !demandesMasquees.has(d.firebaseKey));
    }
    
    if(demandesFiltrees.length === 0) {
        tbody.innerHTML = "<tr><td colspan='9' style='text-align:center;'>Aucune demande trouvée</td></tr>";
        return;
    }
    
    demandesFiltrees.forEach(demande => {
        let statusClass = "";
        let statusText = "";
        
        switch(demande.statut) {
            case "valide":
                statusClass = "status-valide";
                statusText = "✅ Validée";
                break;
            case "refuse":
                statusClass = "status-refuse";
                statusText = "❌ Refusée";
                break;
            default:
                statusClass = "status-en-attente";
                statusText = "⏳ En attente";
        }
        
        const estMasquee = demandesMasquees.has(demande.firebaseKey);
        
        // Afficher le commentaire si la demande est refusée
        let commentaireHtml = "-";
        if(demande.statut === "refuse" && demande.commentaire) {
            commentaireHtml = `<span class="commentaire-text">📝 ${escapeHtml(demande.commentaire)}</span>`;
        } else if(demande.statut === "refuse") {
            commentaireHtml = `<span class="commentaire-text" style="color:#999;">Aucun commentaire</span>`;
        }
        
        // Ajouter le bouton d'action uniquement pour les demandes validées
        let actionButton = "";
        if(demande.statut === "valide") {
            if(estMasquee) {
                actionButton = `<button class="show-request-btn" onclick="showRequest('${demande.firebaseKey}')">🔄 Afficher</button>`;
            } else {
                actionButton = `<button class="hide-request-btn" onclick="hideRequest('${demande.firebaseKey}')">🙈 Masquer</button>`;
            }
        } else {
            actionButton = "-";
        }
        
        const row = document.createElement("tr");
        
        row.innerHTML = `
            <td>${demande.date || ""}</td>
            <td>${demande.heure || ""}</td>
            <td>${demande.referenceProduit || ""}</td>
            <td>${demande.designationProduit || ""}</td>
            <td>${demande.quantite || 0}</td>
            <td><span class="status ${statusClass}">${statusText}</span></td>
            <td>${demande.nomMagasinier ? demande.nomMagasinier : "-"}</td>
            <td class="commentaire-cell">${commentaireHtml}</td>
            <td style="text-align:center;">${actionButton}</td>
        `;
        
        tbody.appendChild(row);
    });
}

// Fonction utilitaire pour échapper les caractères HTML
function escapeHtml(text) {
    if(!text) return "";
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ========== AFFICHER LES PRODUITS ==========
function afficherProduits(liste) {
    container.innerHTML = "";
    
    if(liste.length === 0) {
        container.innerHTML = "<div style='text-align:center;padding:50px;'>Aucun produit trouvé</div>";
        return;
    }
    
    liste.forEach(produit => {
        let stockClass = "";
        if(produit.stockActuel > 10) {
            stockClass = "stock-ok";
        } else if(produit.stockActuel > 0) {
            stockClass = "stock-low";
        } else {
            stockClass = "stock-out";
        }
        
        const nombreDemandes = produitsDemandes[produit.reference] || 0;
        
        const card = document.createElement("div");
        card.className = "card";
        
        card.innerHTML = `
            <img src="${produit.image}" onerror="this.src='https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc?q=80&w=1200&auto=format&fit=crop'">
            <div class="card-content">
                <div class="reference">
                    Référence : ${produit.reference}
                    ${nombreDemandes > 0 ? `<span style="color:#ff9800; margin-left:8px;">🔥 ${nombreDemandes} demandé(s)</span>` : ''}
                </div>
                <div class="designation">
                    ${produit.designation}
                </div>
                <div class="stock ${stockClass}">
                    Stock : ${produit.stockActuel}
                </div>
                <button class="btn" ${produit.stockActuel === 0 ? 'disabled style="opacity:0.5;"' : ''}>
                    ${produit.stockActuel === 0 ? 'Rupture' : 'Demander'}
                </button>
            </div>
        `;
        
        const btn = card.querySelector(".btn");
        if(produit.stockActuel > 0) {
            btn.addEventListener("click", () => {
                openModal(produit);
            });
        }
        
        container.appendChild(card);
    });
}

// ========== MODAL ==========
function openModal(produit) {
    produitSelectionne = produit;
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalRef").innerText = produit.reference;
    document.getElementById("modalName").innerText = produit.designation;
    document.getElementById("modalStock").innerText = produit.stockActuel;
    document.getElementById("quantityInput").value = "";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
    produitSelectionne = null;
}

// ========== AFFICHER LES DEMANDES ==========
function afficherDemandes() {
    const tbody = document.getElementById("demandesList");
    if(!tbody) return;
    
    tbody.innerHTML = "";
    
    let demandesFiltrees = demandes;
    
    // Filtrer les demandes masquées si nécessaire
    if(!afficherMasques) {
        demandesFiltrees = demandes.filter(d => !demandesMasquees.has(d.firebaseKey));
    }
    
    if(demandesFiltrees.length === 0) {
        tbody.innerHTML = "<tr><td colspan='9' style='text-align:center;'>Aucune demande trouvée</td></tr>";
        return;
    }
    
    demandesFiltrees.forEach(demande => {
        let statusClass = "";
        let statusText = "";
        
        switch(demande.statut) {
            case "valide":
                statusClass = "status-valide";
                statusText = "✅ Validée";
                break;
            case "refuse":
                statusClass = "status-refuse";
                statusText = "❌ Refusée";
                break;
            default:
                statusClass = "status-en-attente";
                statusText = "⏳ En attente";
        }
        
        const estMasquee = demandesMasquees.has(demande.firebaseKey);
        
        // Affichage du commentaire de refus (utilisation de commentaireRefus)
        let commentaireHtml = "-";
        if(demande.statut === "refuse" && demande.commentaireRefus) {
            commentaireHtml = `<span class="commentaire-text">📝 ${escapeHtml(demande.commentaireRefus)}</span>`;
        } else if(demande.statut === "refuse") {
            commentaireHtml = `<span class="commentaire-text" style="color:#999;">Aucun commentaire</span>`;
        }
        
        // Ajouter le bouton d'action uniquement pour les demandes validées
        let actionButton = "";
        if(demande.statut === "valide") {
            if(estMasquee) {
                actionButton = `<button class="show-request-btn" onclick="showRequest('${demande.firebaseKey}')">🔄 Afficher</button>`;
            } else {
                actionButton = `<button class="hide-request-btn" onclick="hideRequest('${demande.firebaseKey}')">🙈 Masquer</button>`;
            }
        } else {
            actionButton = "-";
        }
        
        const row = document.createElement("tr");
        
        row.innerHTML = `
            <td>${demande.date || ""}</td>
            <td>${demande.heure || ""}</td>
            <td>${demande.referenceProduit || ""}</td>
            <td>${demande.designationProduit || ""}</td>
            <td>${demande.quantite || 0}</td>
            <td><span class="status ${statusClass}">${statusText}</span></td>
            <td>${demande.nomMagasinier ? demande.nomMagasinier : "-"}</td>
            <td class="commentaire-cell">${commentaireHtml}</td>
            <td style="text-align:center;">${actionButton}</td>
        `;
        
        tbody.appendChild(row);
    });
}

// ========== AUTHENTIFICATION AVEC REDIRECTION POUR MAGASINIER ==========
async function connexion() {
    const type = document.getElementById("typeIdentifiant").value;
    const identifiant = document.getElementById("identifiantInput").value.trim();
    
    if(type === "" || identifiant === "") {
        alert("Veuillez remplir les informations.");
        return;
    }
    
    try {
        const response = await fetch(`${BASE}/utilisateurs.json`);
        const data = await response.json();
        
        let foundUser = null;
        let userKey = null;
        
        for(let key in data) {
            const user = data[key];
            if(type === "IPN" && user.ipn === identifiant) {
                foundUser = user;
                userKey = key;
                break;
            }
            else if(type === "UET" && user.uet === identifiant) {
                foundUser = user;
                userKey = key;
                break;
            }
            else if(type === "Nom" && user.nom && user.nom.toLowerCase() === identifiant.toLowerCase()) {
                foundUser = user;
                userKey = key;
                break;
            }
        }
        
        if(foundUser) {
            // Vérifier si l'utilisateur est un MAGASINIER
            if(foundUser.uet === "MAGASINIER") {
                // Rediriger vers la page des magasiniers
                alert(`🔐 Redirection vers l'interface Magasinier...`);
                window.location.href = MAGASINIER_REDIRECT_URL;
                return;
            }
            // Vérifier si l'utilisateur est un RÉCEPTIONNAIRE
            else if(foundUser.uet === "LOGISTIQUE") {
                currentUser = {
                    id: userKey,
                    ipn: foundUser.ipn,
                    nom: foundUser.nom,
                    uet: foundUser.uet
                };
                
                document.getElementById("loginContainer").style.display = "none";
                document.getElementById("mainPage").classList.remove("hidden");
                
                document.getElementById("userInfo").innerHTML = 
                    "<strong>" + type + " :</strong> " + identifiant + " | UET: " + foundUser.uet;
                
                loadHiddenPreferences();
                await loadProductsFromFirebase();
            }
            else {
                alert("❌ Accès refusé. Rôle non reconnu.");
            }
        }
        else {
            alert("❌ Accès refusé. Utilisateur non trouvé.");
        }
        
    } catch(error) {
        console.error("Erreur authentification:", error);
        alert("Erreur de connexion au serveur");
    }
}
